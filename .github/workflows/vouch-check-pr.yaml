name: Check PR

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/recheck'))
    steps:
      # Step 1: Auto-close denounced users
      - uses: mitchellh/vouch/action/check-pr@main
        id: denounced
        with:
          pr-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          require-vouch: false
          auto-close: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Comment on non-vouched users (but don't close)
      - uses: mitchellh/vouch/action/check-pr@main
        if: steps.denounced.outputs.status != 'closed'
        with:
          pr-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          require-vouch: true
          auto-close: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
